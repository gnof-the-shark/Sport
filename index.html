<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sport Tracker 🏋️</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div id="auth-screen">
    <div class="auth-box">
        <div class="auth-logo">
            <span class="logo-icon">🏋️</span>
            <h1>Sport Tracker</h1>
            <p>Suivez vos performances sportives</p>
        </div>

        <div class="auth-tabs">
            <button class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">Connexion</button>
            <button class="auth-tab" id="tab-register" onclick="switchAuthTab('register')">Inscription</button>
        </div>

        <div id="auth-error" class="auth-error hidden"></div>

        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="login-email">Adresse e-mail</label>
                <input id="login-email" class="form-control" type="email" placeholder="vous@exemple.com" required />
            </div>
            <div class="form-group">
                <label for="login-password">Mot de passe</label>
                <input id="login-password" class="form-control" type="password" placeholder="••••••••" required />
            </div>
            <button type="submit" class="btn btn-primary btn-full">Se connecter</button>
        </form>

        <form id="register-form" class="hidden" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label for="reg-name">Pseudo</label>
                <input id="reg-name" class="form-control" type="text" placeholder="Votre pseudo" required />
            </div>
            <div class="form-group">
                <label for="reg-email">Adresse e-mail</label>
                <input id="reg-email" class="form-control" type="email" placeholder="vous@exemple.com" required />
            </div>
            <div class="form-group">
                <label for="reg-password">Mot de passe</label>
                <input id="reg-password" class="form-control" type="password" minlength="6" required />
            </div>
            <button type="submit" class="btn btn-primary btn-full">Créer un compte</button>
        </form>

        <div class="divider">ou</div>
        <button class="btn btn-google btn-full" onclick="handleGoogleSignIn()">Continuer avec Google</button>
    </div>
</div>

<div id="app-screen" class="hidden">
    <nav class="navbar">
        <div class="navbar-brand">
            <span class="brand-icon" id="nav-sport-icon">🏋️</span> Sport Tracker
        </div>
        <div class="navbar-right">
            <span class="navbar-sport-badge" id="nav-sport-name">Sit-ups</span>
            <span class="admin-badge admin-only" id="admin-badge">ADMIN</span>
            <div class="user-avatar" id="user-avatar">?</div>
            <button class="btn btn-secondary btn-sm" onclick="handleLogout()">Déco</button>
        </div>
    </nav>

    <div class="tab-nav">
        <button class="tab-btn active" onclick="showTab('dashboard')">📊 Dashboard</button>
        <button class="tab-btn" onclick="showTab('log')">➕ Enregistrer</button>
        <button class="tab-btn" onclick="showTab('leaderboard')">🏆 Classement</button>
        <button class="tab-btn" onclick="showTab('feed')">🔄 Communauté</button>
        <button class="tab-btn admin-only" id="admin-tab-btn" onclick="showTab('admin')">⚙️ Admin</button>
    </div>

    <div class="main-content">
        <div id="tab-dashboard" class="tab-content">
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-value" id="stat-total">0</div><div class="stat-label">Total</div></div>
                <div class="stat-card"><div class="stat-value" id="stat-today">0</div><div class="stat-label">Aujourd'hui</div></div>
            </div>
        </div>

        <div id="tab-admin" class="tab-content hidden admin-only">
            <div class="card">
                <h2>Panneau d'administration</h2>
                <div class="admin-grid">
                    <button class="btn btn-danger" onclick="openModal('modal-reset')">Réinitialiser Scores</button>
                    <button class="btn btn-primary" onclick="openModal('modal-sport')">Changer Sport</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="toast-container"></div>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="admin.js"></script>
<script src="app.js"></script>
</body>
</html>
